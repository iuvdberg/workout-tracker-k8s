# Fill in real values before deploying!
# DATABASE_URL uses the postgres Service name as hostname (resolves within the cluster).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: workout-tracker
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/workout_tracker"
  JWT_SECRET: "change-me-to-a-long-random-string"
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
